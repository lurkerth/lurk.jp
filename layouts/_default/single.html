<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="{{ .Params.description | default .Site.Title }}" />
    <meta property="og:title" content="{{ .Title }}" />
    <meta property="og:url" content="{{ .Permalink }}" />
    <meta property="og:description" content="{{ .Params.description | default .Site.Title }}" />
    <title>{{ .Title }} — {{ .Site.Title }}</title>
    <link rel="canonical" href="{{ .Permalink }}" />
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  </head>
  <body>
    <a class="skip-link" href="#content">Skip to content</a>
    <nav class="menu">
      <a href="/">home</a>
      <a href="/blog">blog</a>
      <a href="/about"{{ if eq .Slug "about" }} class="active"{{ end }}>about</a>
      <a href="/gallery"{{ if eq .Slug "gallery" }} class="active"{{ end }}>gallery</a>
      <a href="/rss">rss</a>
    </nav>
    <main id="content">
      <h1>{{ .Title }}</h1>
      {{ .Content }}
    </main>
    <footer>© 2026 <a href="https://www.gnu.org/licenses/gpl-3.0.html" rel="noopener noreferrer" target="_blank">GPL-3.0</a><br><i class="the-end"></i></footer>
  </body>
</html>
