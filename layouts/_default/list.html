<!DOCTYPE html>
<html lang="en">
  <head>{{ partial "head.html" . }}</head>
  <body>
    {{ partial "nav.html" . }}
    <main id="content">
      <h1>{{ .Title | lower }}</h1>
      {{ with .Pages }}
        <ul>
          {{ range . }}
            <li>
              <a href="{{ .RelPermalink }}"><strong>{{ .Title }}</strong></a>
              {{ if .Date }}
                <br>
                <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 02, 2006" | lower }}</time>
              {{ end }}
            </li>
          {{ end }}
        </ul>
      {{ end }}
    </main>
    {{ partial "footer.html" . }}
  </body>
</html>
